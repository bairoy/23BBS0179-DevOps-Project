apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-tech-website-deployment
  labels:
    app: abc-tech-website
    tier: frontend
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: abc-tech-website
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: abc-tech-website
        tier: frontend
    spec:
      containers:
      - name: website-container
        image: abc-tech-website:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
